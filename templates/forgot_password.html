{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header bg-info text-white text-center">
                <h4 class="card-title mb-0"><i class="bi bi-key me-2"></i>Forgot Password</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted text-center mb-4">Enter your email address and we'll send you a link to reset your password.</p>
                <form method="POST" action="{{ url_for('forgot_password') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-4">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required
                               placeholder="Enter your registered email">
                    </div>
                    <button type="submit" class="btn btn-info text-white w-100">
                        <i class="bi bi-envelope me-2"></i>Send Reset Link
                    </button>
                </form>
                <div class="text-center mt-3">
                    <p class="mb-0">Remembered your password?
                        <a href="{{ url_for('login') }}" class="text-decoration-none">Back to Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
